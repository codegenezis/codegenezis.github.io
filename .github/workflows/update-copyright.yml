name: Update Copyright Year

on:
  schedule:
    # Runs on January 1st at 00:00 UTC every year
    - cron: '0 0 1 1 *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-copyright:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update copyright year in README.md
        run: |
          CURRENT_YEAR=$(date +%Y)
          # Update README.md with new copyright year
          sed -i "s/Copyright (C) [0-9]\+-[0-9]*/Copyright (C) 2020-$CURRENT_YEAR/g" README.md
          sed -i "s/Copyright (C) 2020 /Copyright (C) 2020-$CURRENT_YEAR /g" README.md
      
      - name: Check if changes were made
        id: verify
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "chore: Update copyright year to $(date +%Y)"
          git push
      
      - name: No changes needed
        if: steps.verify.outputs.changed == 'false'
        run: echo "Copyright year is already up to date"
